<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GX20 溫度監視</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=6">
<script src="{{ url_for('static', filename='vendor/chart.umd.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/chartjs-adapter-date-fns.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/socket.io.min.js') }}"></script>
</head>
<body data-theme="light">

<header class="topbar">
  <span class="brand">GX20 溫度監視</span>
  <label>站點：
    <select id="stationSelect">
      {% for s in stations %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
    </select>
  </label>
  <a href="/settings" class="btn">設定</a>
  <button id="exportCsvBtn" class="btn" title="將當前工位記錄儲存為 CSV">儲存 CSV</button>
  <button id="clearBtn" class="btn btn-danger" title="清除當前工位的歷史（可選擇是否歸檔）">清除此工位</button>
  <button id="themeBtn" class="btn" title="切換明亮/暗黑">☀/🌙</button>
  <span class="conn">
    <span id="connDot" class="dot off"></span>
    <span id="connText">連線中…</span>
  </span>
  <span class="last-ts" id="lastTs">—</span>
</header>

<main>
  <section class="chart-area">
    <canvas id="chart"></canvas>
    <!-- 游標模式 overlay：只在量測狀態下顯示（由 JS 加 .active 切換） -->
    <div id="cursorOverlay" class="cursor-overlay" aria-hidden="true">
      <div id="cursorRange" class="cursor-range" hidden></div>
      <div id="cursorLeft"  class="cursor-bar cursor-left"  data-side="left"  hidden>
        <span class="cursor-time" id="cursorLeftTime"></span>
      </div>
      <div id="cursorRight" class="cursor-bar cursor-right" data-side="right" hidden>
        <span class="cursor-time" id="cursorRightTime"></span>
      </div>
    </div>
  </section>

  <aside class="readout">
    <div class="readout-header">
      <h3>最新讀值</h3>
      <!-- 量測模式 toggle：游標值 / 即時狀態 -->
      <div class="mode-toggle" role="group" aria-label="最新讀值模式">
        <button type="button" id="modeLiveBtn"    class="mode-btn active" data-mode="live">即時狀態</button>
        <button type="button" id="modeCursorBtn"  class="mode-btn"        data-mode="cursor">量測狀態</button>
      </div>
    </div>
    <div class="readout-controls">
      <label>X 軸：
        <select id="chartXSel">
          <option value="0">全部</option>
          <option value="15">15 分鐘</option>
          <option value="30">30 分鐘</option>
          <option value="60">1 小時</option>
          <option value="180">3 小時</option>
          <option value="360">6 小時</option>
          <option value="720">12 小時</option>
          <option value="1440">1 天</option>
        </select>
      </label>
      <label>速率：
        <select id="rateSel">
          <option value="1">1 分鐘</option>
          <option value="2">2 分鐘</option>
          <option value="5">5 分鐘</option>
          <option value="10">10 分鐘</option>
          <option value="15">15 分鐘</option>
          <option value="30">30 分鐘</option>
          <option value="60">60 分鐘</option>
        </select>
      </label>
      <label>平均：
        <select id="avgSel">
          <option value="1">1 分鐘</option>
          <option value="2">2 分鐘</option>
          <option value="5">5 分鐘</option>
          <option value="10">10 分鐘</option>
          <option value="15">15 分鐘</option>
          <option value="30">30 分鐘</option>
          <option value="60">60 分鐘</option>
          <option value="180">3 小時</option>
          <option value="360">6 小時</option>
        </select>
      </label>
    </div>
    <!-- 區間資訊列：只在量測模式顯示 -->
    <div id="cursorInfo" class="cursor-info" hidden>
      <div class="cursor-info-row">
        <span class="cursor-info-label">區間：</span>
        <span id="cursorInfoRange">—</span>
      </div>
      <div class="cursor-info-row">
        <span class="cursor-info-label">資料覆蓋：</span>
        <span id="cursorInfoCoverage">計算中…</span>
      </div>
    </div>
    <table id="readoutTable">
      <thead><tr>
        <th>#</th>
        <th>名稱/別名</th>
        <th>讀值 (°C)</th>
        <th id="rateTh">速率 (°C/1min)</th>
        <th id="avgTh">平均 (°C/1min)</th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </aside>
</main>

<script src="{{ url_for('static', filename='js/storage.js') }}?v=6"></script>
<script src="{{ url_for('static', filename='js/lttb.js') }}?v=6"></script>
<script src="{{ url_for('static', filename='js/main.js') }}?v=6"></script>
</body>
</html>
